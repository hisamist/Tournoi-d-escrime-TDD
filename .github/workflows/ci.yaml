name: CI

on:
  push:
    branches: main
  pull_request:
    

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurer les dépendances
        run: dotnet restore

      - name: Compiler le projet
        run: dotnet build --no-restore --configuration Release

      - name: Lancer les tests avec couverture
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Générer le rapport de couverture
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Afficher la couverture dans le résumé
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY